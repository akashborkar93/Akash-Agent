name: Pull Request Workflow

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check PR title
        run: echo "PR Title Check Passed"
      
      - name: Validate files
        run: |
          echo "Validating PR files..."
          echo "Running linting and tests..."
      
      - name: Build
        run: echo "Building project..."

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v3
      
      - name: Run tests
        run: echo "Running tests..."

  copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Request Copilot Code Review
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const repo = context.repo;
            
            console.log(`Requesting GitHub Copilot code review for PR #${prNumber}`);
            
            try {
              // Request copilot as reviewer
              await github.rest.pulls.requestReviewers({
                owner: repo.owner,
                repo: repo.repo,
                pull_number: prNumber,
                reviewers: ['copilot']
              });
              console.log('✅ Copilot review requested successfully');
            } catch (error) {
              if (error.status === 422) {
                console.log('ℹ️ Copilot may not be available or configured for this repository');
              } else {
                console.error('Error requesting review:', error.message);
              }
            }
      
      - name: Add review request comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "🤖 **Copilot Code Review Requested**
          
          Automated code review by GitHub Copilot is in progress. This review will check for:
          - Code quality and best practices
          - Potential bugs and security issues
          - Performance concerns
          - Style and consistency
          - Security vulnerabilities
          
          Please refer to [INSTRUCTIONS.md](https://github.com/${{ github.repository }}/blob/main/INSTRUCTIONS.md) for review guidelines.
          
          Please address any feedback provided by Copilot and maintainers."
      
      - name: Get PR details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📋 PR Review Details:"
          echo "PR #${{ github.event.pull_request.number }}"
          echo "Author: ${{ github.event.pull_request.user.login }}"
          echo "Title: ${{ github.event.pull_request.title }}"
          echo "Branch: ${{ github.event.pull_request.head.ref }}"
          echo "Changes: ${{ github.event.pull_request.changed_files }} files"
